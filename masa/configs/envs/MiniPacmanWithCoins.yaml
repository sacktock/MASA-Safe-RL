defaults:
  env:
    id: MiniPacmanWithCoins
    max_episode_steps: 100
    label_fn: masa.envs.tabular.mini_pacman:label_fn
    cost_fn: masa.envs.tabular.mini_pacman:cost_fn

  constraint:
    type: PCTL
    cost_budget: 0.01

  run:
    total_timesteps: 1000000
    eval_every: 10000
    eval_episodes: 10
    log_every: 10000
    stats_window_size: 100