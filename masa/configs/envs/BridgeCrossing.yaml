defaults:
  env:
    id: BridgeCrossing
    max_episode_steps: 400
    label_fn: masa.envs.tabular.bridge_crossing:label_fn
    cost_fn: masa.envs.tabular.bridge_crossing:cost_fn

  constraint:
    type: PCTL
    alpha: 0.05

  run:
    total_timesteps: 500000
    eval_every: 10000
    eval_episodes: 10
    log_every: 10000
    stats_window_size: 100
