defaults:
  env:
    id: MiniPacman
    max_episode_steps: 100
    label_fn: masa.envs.tabular.mini_pacman:label_fn
    cost_fn: masa.envs.tabular.mini_pacman:cost_fn

  constraint:
    type: CMDP
    cost_budget: 0

  run:
    total_timesteps: 250000
    eval_every: 5000
    eval_episodes: 10
    log_every: 5000
    stats_window_size: 100