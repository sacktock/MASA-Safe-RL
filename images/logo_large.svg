      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-22%" y="-18%" width="144%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#081D33" flood-opacity="0.16"/>
    </filter>
    <filter id="nodeShadow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#081D33" flood-opacity="0.22"/>
