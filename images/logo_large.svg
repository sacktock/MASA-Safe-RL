<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="415" viewBox="0 0 1024 415" role="img" aria-labelledby="title desc">
  <title id="title">MASA-Safe-RL title art</title>
  <desc id="desc">MASA-Safe-RL wordmark with shield-shaped safe reinforcement learning art: agent nodes, hazards, constraints, and a safe policy trajectory.</desc>
  <defs>
    <linearGradient id="backgroundGradient" x1="0" y1="0" x2="1024" y2="415" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.58" stop-color="#F8FCFB"/>
      <stop offset="1" stop-color="#EFF8F3"/>
    </linearGradient>
    <linearGradient id="boundaryGradient" x1="62" y1="36" x2="326" y2="338" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B9403F"/>
      <stop offset="0.48" stop-color="#E17643"/>
      <stop offset="1" stop-color="#2FBF71"/>
    </linearGradient>
    <linearGradient id="policyGradient" x1="94" y1="253" x2="286" y2="119" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1AA7EC"/>
      <stop offset="0.55" stop-color="#33C7A0"/>
      <stop offset="1" stop-color="#5DDD78"/>
    </linearGradient>
    <linearGradient id="fieldGradient" x1="74" y1="58" x2="307" y2="318" gradientUnits="userSpaceOnUse">
